name: Build Paper

on:
  push:
    branches:
      - main
      - copilot/setup-research-paper-with-showyourwork
    paths:
      - 'paper/**'
      - '.github/workflows/build-paper.yml'
  pull_request:
    paths:
      - 'paper/**'
      - '.github/workflows/build-paper.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build research paper
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install showyourwork
        run: |
          pip install showyourwork
          
      - name: Build paper
        run: |
          cd paper
          showyourwork build
          
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf
          path: paper/ms.pdf
          
      - name: Upload build report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: paper/report.html
